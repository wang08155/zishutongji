<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>免费字数统计工具 | 在线字符计数神器</title>
    <meta name="description" content="免费的在线字数统计工具，实时统计文本的字数、字符数、句数和段落数。简单、快速、保护隐私。">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 30px;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            min-height: 250px;
            padding: 20px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 8px;
            font-size: 14px;
        }

        .actions {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        button.clear-btn {
            background: #e0e0e0;
            color: #333;
        }

        button.clear-btn:hover {
            background: #ccc;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }

        @media (max-width: 600px) {
            .card {
                padding: 20px;
            }
            .stat-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📝 免费字数统计工具</h1>
            <div class="subtitle">实时统计 | 完全免费 | 隐私保护（数据不上传）</div>

            <textarea id="textInput" placeholder="在这里粘贴或输入您的文本...&#10;&#10;支持中文、英文等各种语言。实时统计字数、字符数。"></textarea>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="wordCount">0</div>
                    <div class="stat-label">📄 字数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="charCount">0</div>
                    <div class="stat-label">🔤 字符数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="charCountNoSpace">0</div>
                    <div class="stat-label">⚡ 字符数(无空格)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="sentenceCount">0</div>
                    <div class="stat-label">📖 句数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="paragraphCount">0</div>
                    <div class="stat-label">📑 段落数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="readTime">0</div>
                    <div class="stat-label">⏱️ 阅读时间(分钟)</div>
                </div>
            </div>

            <div class="actions">
                <button id="copyBtn">📋 复制文本</button>
                <button id="clearBtn" class="clear-btn">🗑️ 清空</button>
            </div>
        </div>
        <footer>
            🚀 简单 · 快速 · 免费 | 所有文本仅在你的浏览器中处理，不会上传到服务器
        </footer>
    </div>

    <script>
        const textarea = document.getElementById('textInput');
        const wordSpan = document.getElementById('wordCount');
        const charSpan = document.getElementById('charCount');
        const charNoSpaceSpan = document.getElementById('charCountNoSpace');
        const sentenceSpan = document.getElementById('sentenceCount');
        const paragraphSpan = document.getElementById('paragraphCount');
        const readTimeSpan = document.getElementById('readTime');

        function updateStats() {
            const text = textarea.value;
            
            // 字符数（所有字符）
            const totalChars = text.length;
            charSpan.textContent = totalChars;
            
            // 字符数（不含空格、换行、制表符）
            const noSpaceChars = text.replace(/[\s\n\r\t]/g, '').length;
            charNoSpaceSpan.textContent = noSpaceChars;
            
            // 字数：按空白字符分割，过滤空字符串
            const words = text.trim().split(/\s+/);
            const wordCount = text.trim() === '' ? 0 : words.length;
            wordSpan.textContent = wordCount;
            
            // 句数：按句号、问号、感叹号、省略号等分割
            const sentences = text.split(/[。!?！？\n]+/).filter(s => s.trim().length > 0);
            sentenceSpan.textContent = sentences.length;
            
            // 段落数：按空行分割
            const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
            paragraphSpan.textContent = paragraphs.length === 0 && text.trim() !== '' ? 1 : paragraphs.length;
            
            // 阅读时间：按每分钟200字估算
            const readingTime = Math.ceil(wordCount / 200);
            readTimeSpan.textContent = readingTime === 0 ? 1 : readingTime;
        }
        
        // 复制文本功能
        document.getElementById('copyBtn').addEventListener('click', async () => {
            if (!textarea.value.trim()) {
                alert('没有内容可复制');
                return;
            }
            try {
                await navigator.clipboard.writeText(textarea.value);
                alert('✅ 已复制到剪贴板');
            } catch (err) {
                alert('复制失败，可以手动选择复制');
            }
        });
        
        // 清空功能
        document.getElementById('clearBtn').addEventListener('click', () => {
            textarea.value = '';
            updateStats();
            textarea.focus();
        });
        
        // 监听输入事件
        textarea.addEventListener('input', updateStats);
        
        // 页面加载时先统计一次（处理预置文本）
        updateStats();
        
        // 可选：Ctrl+Enter 清空
        textarea.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('clearBtn').click();
            }
        });
    </script>
</body>
</html>
